<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darklands — Map of Greater Germany</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      background: #0d0d10;
      color: #ddd8cc;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── City list sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #252530;
      background: #111116;
    }

    .sidebar-header {
      padding: 14px 12px 10px;
      border-bottom: 1px solid #252530;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #706a58;
      margin-bottom: 5px;
    }
    .sidebar-nav {
      font-size: 10px;
      color: #484440;
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.1s;
    }
    .sidebar-nav:hover { color: #9a9080; }

    .city-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .city-list::-webkit-scrollbar { width: 6px; }
    .city-list::-webkit-scrollbar-track { background: #111116; }
    .city-list::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 3px; }

    .city-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 3px 12px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.5;
      color: #a09880;
      transition: background 0.1s;
    }

    .city-item:hover { background: #13131a; color: #c8c0a8; }

    .city-item.selected {
      background: #16161e;
      color: #e8c840;
    }

    .city-item .grid-ref {
      font-size: 10px;
      color: #484858;
      min-width: 22px;
      text-align: right;
      font-family: monospace;
    }

    .city-item.selected .grid-ref { color: #706858; }

    /* ── Dev banner ── */
    .dev-banner {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 6px 12px;
      background: rgba(13, 13, 16, 0.92);
      border-bottom: 1px solid #383848;
      font-size: 11px;
      letter-spacing: 1px;
      color: #9a9880;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      user-select: none;
    }
    .dev-banner .dev-label {
      color: #c8a835;
      font-weight: bold;
      text-transform: uppercase;
    }
    .dev-banner .dev-city {
      color: #e8c840;
    }

    /* ── Map panel ── */
    .map-panel {
      flex: 1;
      overflow: auto;
      position: relative;
      background: #0d0d10;
    }

    .map-panel::-webkit-scrollbar { width: 8px; height: 8px; }
    .map-panel::-webkit-scrollbar-track { background: #0d0d10; }
    .map-panel::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 4px; }

    .map-container {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .map-container img {
      display: block;
      max-width: none;
    }

    /* ── SVG overlay ── */
    .map-overlay {
      position: absolute;
      top: 0;
      left: 0;
    }

    @keyframes city-pulse {
      0%, 100% { r: 7.5px; }
      50%       { r: 9.5px; }
    }

    .city-marker { cursor: pointer; }
    .city-marker circle { transition: fill 0.1s; }
    .city-marker:hover circle { fill: #c8a835; }
    .city-marker.selected circle {
      fill: #e8c840;
      r: 7.5px;
      animation: city-pulse 1.8s ease-in-out infinite;
    }

    /* ── Detail panel ── */
    .detail-panel {
      width: 220px;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #252530;
      background: #111116;
      overflow-y: auto;
    }
    .detail-panel::-webkit-scrollbar { width: 6px; }
    .detail-panel::-webkit-scrollbar-track { background: #111116; }
    .detail-panel::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 3px; }

    .detail-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #1e1e28;
    }
    .detail-header {
      padding: 14px 12px 10px;
      border-bottom: 1px solid #252530;
      flex-shrink: 0;
    }
    .detail-city-name {
      font-size: 14px;
      color: #e8c840;
      margin-bottom: 3px;
    }
    .detail-city-meta {
      font-size: 10px;
      color: #484858;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .detail-section {
      padding: 8px 12px;
      border-bottom: 1px solid #1c1c24;
      flex-shrink: 0;
    }
    .detail-section-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #525060;
      margin-bottom: 6px;
    }
    .detail-badges { display: flex; flex-wrap: wrap; gap: 4px; }
    .detail-badge {
      font-size: 10px;
      padding: 2px 7px;
      border: 1px solid #252530;
      color: #9a9880;
      background: #111116;
    }
    .detail-table { width: 100%; border-collapse: collapse; }
    .detail-table tr + tr td { border-top: 1px solid #181820; }
    .detail-table td { padding: 3px 0; font-size: 12px; color: #a09880; }
    .detail-table td.skill {
      text-align: right;
      font-family: monospace;
      font-size: 11px;
      color: #ddd8cc;
    }
  </style>
</head>

    function gridToPixel(grid) {
      const col = grid.charCodeAt(0) - 65; // A=0 … H=7
      const row = parseInt(grid[1]) - 1;   // 1=0 … 8=7
      return {
        px: Math.round((col + 0.5) * (1070 / 8)),
        py: Math.round((row + 0.5) * (1048 / 8)),
      };
    }

      {id:"wurzburg",              name:"Würzburg",              grid:"C6", size:5, cath:true,  univ:true,  px:353,  py:701,  bs:24,sw:0, ar:32,bw:0, ax:25,cl:25,slum:0,leih:0},

      {id:"zurich",                name:"Zürich",                grid:"B8", size:5, cath:true,  univ:false, px:222,  py:982,  bs:0, sw:26,ar:25,bw:29,ax:32,cl:24,slum:1,leih:1},
      {id:"zwolle",                name:"Zwolle",                grid:"A3", size:3, cath:false, univ:false, px:89,   py:356,  bs:23,sw:0, ar:0, bw:0, ax:25,cl:36,slum:0,leih:0},
    ].map(c => ({ ...gridToPixel(c.grid), ...c }));
  </script>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    function CityList({ cities, selectedId, onSelect, listRef }) {
      return (
        <div className="sidebar">
          <div className="sidebar-header">
            <div className="sidebar-title">Index of Cities</div>
            <a href="index.html" className="sidebar-nav">← Home</a>
          </div>
          <div className="city-list" ref={listRef}>
            {cities.map(city => (
              <div
                key={city.id}
                className={"city-item" + (selectedId === city.id ? " selected" : "")}
                data-city-id={city.id}
                onClick={() => onSelect(city.id)}
              >
                <span>{city.name}</span>
                <span className="grid-ref">{city.grid}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MapPanel({ cities, selectedId, onSelectCity, devMode }) {
      const panelRef = useRef(null);
      const imgRef = useRef(null);
      const svgRef = useRef(null);
      const [imgSize, setImgSize] = useState(null);

      const handleImgLoad = useCallback(() => {
        const img = imgRef.current;
        if (img) setImgSize({ w: img.offsetWidth, h: img.offsetHeight });
      }, []);

      useEffect(() => {
        if (imgRef.current && imgRef.current.complete) handleImgLoad();
      }, [handleImgLoad]);

      useEffect(() => {
        const img = imgRef.current;
        if (!img) return;
        const observer = new ResizeObserver(() => {
          setImgSize({ w: img.offsetWidth, h: img.offsetHeight });
        });
        observer.observe(img);
        return () => observer.disconnect();
      }, []);

      useEffect(() => {
        if (!selectedId || !panelRef.current || !imgRef.current) return;
        const city = cities.find(c => c.id === selectedId);
        if (!city) return;
        const img = imgRef.current;
        const panel = panelRef.current;
        panel.scrollLeft = city.px * (img.offsetWidth  / 1070) - panel.clientWidth  / 2;
        panel.scrollTop  = city.py * (img.offsetHeight / 1048) - panel.clientHeight / 2;
      }, [selectedId, cities]);

      const handleSvgClick = useCallback((e) => {
        if (!svgRef.current) return;
        const pt = svgRef.current.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const { x, y } = pt.matrixTransform(svgRef.current.getScreenCTM().inverse());
        const px = Math.round(x);
        const py = Math.round(y);
        const nearest = cities.reduce((best, city) => {
          const d = Math.hypot(city.px - px, city.py - py);
          return d < best.d ? { d, city } : best;
        }, { d: Infinity, city: null });
        const hit = nearest.d < 25 ? nearest.city : null;
        console.log(`px:${px}, py:${py}  →  ${hit ? `${hit.name} (${hit.id})` : 'null'}`);
        if (hit) onSelectCity(hit.id);
      }, [cities, onSelectCity]);

      const selectedCity = selectedId ? cities.find(c => c.id === selectedId) : null;

      return (
        <div className="map-panel" ref={panelRef}>
          {devMode && (
            <div className="dev-banner">
              <span className="dev-label">Dev</span>
              {selectedCity
                ? <><span>Pinning:</span><span className="dev-city">{selectedCity.name}</span><span>— click map to place</span></>
                : <span>Select a city from the list, then click the map to pin it</span>
              }
            </div>
          )}
          <div className="map-container">
            <img
              ref={imgRef}
              src="../src/main/resources/darklands_map_only.png"
              alt="Darklands — Map of Greater Germany"
              style={{ width: '120%', height: 'auto' }}
              onLoad={handleImgLoad}
            />
            {imgSize && (
              <svg
                ref={svgRef}
                className="map-overlay"
                viewBox="0 0 1070 1048"
                width={imgSize.w}
                height={imgSize.h}
                style={{
                  pointerEvents: devMode ? 'all' : 'none',
                  cursor: devMode ? 'crosshair' : 'default',
                }}
                onClick={devMode ? handleSvgClick : undefined}
              >
                {cities.map(city => (
                  <g
                    key={city.id}
                    data-marker-id={city.id}
                    className={"city-marker" + (selectedId === city.id ? " selected" : "")}
                    style={{ pointerEvents: 'all', cursor: devMode ? 'crosshair' : 'pointer' }}
                    onClick={(e) => {
                      if (devMode) return;
                      e.stopPropagation();
                      onSelectCity(city.id);
                    }}
                  >
                    <title>{city.name}</title>
                    <circle
                      cx={city.px}
                      cy={city.py}
                      r={selectedId === city.id ? 7.5 : 5}
                      fill={selectedId === city.id ? '#e8c840' : '#706858'}
                      stroke="#0d0d10"
                      strokeWidth="1.5"
                    />
                  </g>
                ))}
              </svg>
            )}
          </div>
        </div>
      );
    }

    function CityDetail({ city }) {
      if (!city) {
        return <div className="detail-panel"><div className="detail-empty">No city selected</div></div>;
      }

      const trades = [
        { label: 'Blacksmith', val: city.bs },
        { label: 'Swordsmith', val: city.sw },
        { label: 'Armorer',    val: city.ar },
        { label: 'Bowyer',     val: city.bw },
        { label: 'Artificer',  val: city.ax },
        { label: 'Clothier',   val: city.cl },
      ].filter(t => t.val);

      const features = [
        city.cath && 'Cathedral',
        city.univ && 'University',
        city.leih && 'Leihhaus',
        city.slum && 'Slum',
      ].filter(Boolean);

      return (
        <div className="detail-panel">
          <div className="detail-header">
            <div className="detail-city-name">{city.name}</div>
            <div className="detail-city-meta">Grid {city.grid} · Size {city.size}</div>
          </div>
          {features.length > 0 && (
            <div className="detail-section">
              <div className="detail-section-title">Features</div>
              <div className="detail-badges">
                {features.map(f => <span key={f} className="detail-badge">{f}</span>)}
              </div>
            </div>
          )}
          {trades.length > 0 && (
            <div className="detail-section">
              <div className="detail-section-title">Trades</div>
              <table className="detail-table">
                <tbody>
                  {trades.map(t => (
                    <tr key={t.label}>
                      <td>{t.label}</td>
                      <td className="skill">{t.val}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [selectedId, setSelectedId] = useState(null);
      const listRef = useRef(null);

      const handleSelect = useCallback((id) => {
        setSelectedId(id);
        const el = listRef.current && listRef.current.querySelector(`[data-city-id="${id}"]`);
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          el.style.outline = '2px solid orange';
          setTimeout(() => { el.style.outline = ''; }, 1500);
        }
      }, []);

      const selectedCity = selectedId ? CITIES.find(c => c.id === selectedId) : null;

      return (
        <div className="app">
          <CityList
            cities={CITIES}
            selectedId={selectedId}
            onSelect={handleSelect}
            listRef={listRef}
          />
          <MapPanel
            cities={CITIES}
            selectedId={selectedId}
            onSelectCity={handleSelect}
            devMode={DEV}
          />
          <CityDetail city={selectedCity} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
