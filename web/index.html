  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      background: #0e0d0a;
      color: #c8b882;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── City list sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #3a3020;
      background: #0b0a08;
    }

    .sidebar-header {
      padding: 14px 12px 10px;
      border-bottom: 1px solid #3a3020;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8a7550;
      flex-shrink: 0;
    }

    .city-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .city-list::-webkit-scrollbar { width: 6px; }
    .city-list::-webkit-scrollbar-track { background: #0b0a08; }
    .city-list::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 3px; }

    .city-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 3px 12px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.5;
      color: #a89060;
      transition: background 0.1s;
    }

    .city-item:hover { background: #1a1810; color: #d4b870; }

    .city-item.selected {
      background: #2a2210;
      color: #f0d060;
    }

    .city-item .grid-ref {
      font-size: 10px;
      color: #5a4e30;
      min-width: 22px;
      text-align: right;
      font-family: monospace;
    }

    .city-item.selected .grid-ref { color: #8a7040; }

    /* ── Map panel ── */
    .map-panel {
      flex: 1;
      overflow: auto;
      position: relative;
      background: #0a0908;
    }

    .map-panel::-webkit-scrollbar { width: 8px; height: 8px; }
    .map-panel::-webkit-scrollbar-track { background: #0a0908; }
    .map-panel::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 4px; }

    .map-container {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .map-container img {
      display: block;
      max-width: none;
    }

    /* ── SVG overlay (future) ── */
    .map-overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>

  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    function CityList({ cities, selectedId, onSelect, listRef }) {
      return (
        <div className="sidebar">
          <div className="sidebar-header">Index of Cities</div>
          <div className="city-list" ref={listRef}>
            {cities.map(city => (
              <div
                key={city.id}
                className={"city-item" + (selectedId === city.id ? " selected" : "")}
                data-city-id={city.id}
                onClick={() => onSelect(city.id)}
              >
                <span>{city.name}</span>
                <span className="grid-ref">{city.grid}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MapPanel({ children }) {
      return (
        <div className="map-panel">
          <div className="map-container">
            <img
              src="../src/main/resources/darklands_map_only.png"
              alt="Darklands — Map of Greater Germany"
              style={{ width: '120%', height: 'auto' }}
            />
            {children}
          </div>
        </div>
      );
    }

    function App() {
      const [selectedId, setSelectedId] = useState(null);
      const listRef = useRef(null);

      const handleSelect = useCallback((id) => {
        setSelectedId(id);
        // Scroll city list to selected item
        if (listRef.current) {
          const el = listRef.current.querySelector(`[data-city-id="${id}"]`);
          if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      }, []);

      return (
        <div className="app">
          <CityList
            cities={CITIES}
            selectedId={selectedId}
            onSelect={handleSelect}
            listRef={listRef}
          />
          <MapPanel>
            {/* SVG overlay added in next task */}
          </MapPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
