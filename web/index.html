<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darklands Reference</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0d0d10;
      color: #ddd8cc;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
    }

    .eyebrow {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #484442;
      margin-bottom: 10px;
    }

    .title {
      font-size: 32px;
      color: #e8c840;
      font-weight: normal;
      letter-spacing: 2px;
    }

    .rule {
      width: 64px;
      height: 1px;
      background: #252530;
      margin: 28px auto;
    }

    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      display: block;
      width: 220px;
      padding: 26px 22px;
      border: 1px solid #222230;
      background: #111116;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:hover {
      border-color: #4a4838;
      background: #141420;
    }

    .card-glyph {
      font-size: 18px;
      color: #323040;
      margin-bottom: 14px;
      transition: color 0.15s;
    }
    .card:hover .card-glyph { color: #5a5640; }

    .card-title {
      font-size: 15px;
      color: #ddd8cc;
      margin-bottom: 8px;
      font-weight: normal;
      transition: color 0.15s;
    }
    .card:hover .card-title { color: #e8c840; }

    .card-desc {
      font-size: 11px;
      color: #484858;
      line-height: 1.65;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="eyebrow">Reference</div>
    <div class="title">Darklands</div>
    <div class="rule"></div>
    <div class="cards">
      <a href="map.html" class="card">
        <div class="card-glyph">✦</div>
        <div class="card-title">Map of Greater Germany</div>
        <div class="card-desc">Interactive city map with trade skills, features, and grid locations.</div>
      </a>
      <a href="saints.html" class="card">
        <div class="card-glyph">✦</div>
        <div class="card-title">Saints of the Realm</div>
        <div class="card-desc">Browse and filter all 137 saints by name, stat bonuses, and special effects.</div>
      </a>
    </div>
  </div>
</body>
</html>
