<!DOCTYPE html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      background: #0e0d0a;
      color: #c8b882;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── City list sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #3a3020;
      background: #0b0a08;
    }

    .sidebar-header {
      padding: 14px 12px 10px;
      border-bottom: 1px solid #3a3020;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8a7550;
      flex-shrink: 0;
    }

    .city-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .city-list::-webkit-scrollbar { width: 6px; }
    .city-list::-webkit-scrollbar-track { background: #0b0a08; }
    .city-list::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 3px; }

    .city-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 3px 12px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.5;
      color: #a89060;
      transition: background 0.1s;
    }

    .city-item:hover { background: #1a1810; color: #d4b870; }

    .city-item.selected {
      background: #2a2210;
      color: #f0d060;
    }

    .city-item .grid-ref {
      font-size: 10px;
      color: #5a4e30;
      min-width: 22px;
      text-align: right;
      font-family: monospace;
    }

    .city-item.selected .grid-ref { color: #8a7040; }

    /* ── Map panel ── */
    .map-panel {
      flex: 1;
      overflow: auto;
      position: relative;
      background: #0a0908;
    }

    .map-panel::-webkit-scrollbar { width: 8px; height: 8px; }
    .map-panel::-webkit-scrollbar-track { background: #0a0908; }
    .map-panel::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 4px; }

    .map-container {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .map-container img {
      display: block;
      max-width: none;
    }

    /* ── SVG overlay ── */
    .map-overlay {
      position: absolute;
      top: 0;
      left: 0;
    }

    @keyframes city-pulse {
      0%, 100% { r: 7.5px; }
      50%       { r: 9.5px; }
    }

    .city-marker { cursor: pointer; }
    .city-marker circle { transition: fill 0.1s; }
    .city-marker:hover circle { fill: #d4a820; }
    .city-marker.selected circle {
      fill: #f0d060;
      r: 7.5px;
      animation: city-pulse 1.8s ease-in-out infinite;
    }
  </style>
</head>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    function CityList({ cities, selectedId, onSelect, listRef }) {
      return (
        <div className="sidebar">
          <div className="sidebar-header">Index of Cities</div>
          <div className="city-list" ref={listRef}>
            {cities.map(city => (
              <div
                key={city.id}
                className={"city-item" + (selectedId === city.id ? " selected" : "")}
                data-city-id={city.id}
                onClick={() => onSelect(city.id)}
              >
                <span>{city.name}</span>
                <span className="grid-ref">{city.grid}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MapPanel({ cities, selectedId, onSelectCity, devMode }) {
      const imgRef = useRef(null);
      const svgRef = useRef(null);
      const [imgSize, setImgSize] = useState(null);

      const handleImgLoad = useCallback(() => {
        const img = imgRef.current;
        if (img) setImgSize({ w: img.offsetWidth, h: img.offsetHeight });
      }, []);

      useEffect(() => {
        // Catch cases where image was already cached and onLoad already fired
        if (imgRef.current && imgRef.current.complete) handleImgLoad();
      }, [handleImgLoad]);

      const handleSvgClick = useCallback((e) => {
        if (!svgRef.current) return;
        const pt = svgRef.current.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const { x, y } = pt.matrixTransform(svgRef.current.getScreenCTM().inverse());
        console.log(`px: ${Math.round(x)}, py: ${Math.round(y)}`);
      }, []);

      return (
        <div className="map-panel">
          <div className="map-container">
            <img
              ref={imgRef}
              src="../src/main/resources/darklands_map_only.png"
              alt="Darklands — Map of Greater Germany"
              style={{ width: '120%', height: 'auto' }}
              onLoad={handleImgLoad}
            />
            {imgSize && (
              <svg
                ref={svgRef}
                className="map-overlay"
                viewBox="0 0 1070 1048"
                width={imgSize.w}
                height={imgSize.h}
                style={{
                  pointerEvents: devMode ? 'all' : 'none',
                  cursor: devMode ? 'crosshair' : 'default',
                }}
                onClick={devMode ? handleSvgClick : undefined}
              >
                {cities.map(city => (
                  <g
                    key={city.id}
                    className={"city-marker" + (selectedId === city.id ? " selected" : "")}
                    style={{ pointerEvents: 'all', cursor: devMode ? 'crosshair' : 'pointer' }}
                    onClick={(e) => {
                      if (devMode) return;
                      e.stopPropagation();
                      onSelectCity(city.id);
                    }}
                  >
                    <title>{city.name}</title>
                    <circle
                      cx={city.px}
                      cy={city.py}
                      r={selectedId === city.id ? 7.5 : 5}
                      fill={selectedId === city.id ? '#f0d060' : '#a08040'}
                      stroke="#0e0d0a"
                      strokeWidth="1.5"
                    />
                  </g>
                ))}
              </svg>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [selectedId, setSelectedId] = useState(null);
      const listRef = useRef(null);

      const handleSelect = useCallback((id) => {
        setSelectedId(id);
        if (listRef.current) {
          const el = listRef.current.querySelector(`[data-city-id="${id}"]`);
          if (el) el.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }
      }, []);

      return (
        <div className="app">
          <CityList
            cities={CITIES}
            selectedId={selectedId}
            onSelect={handleSelect}
            listRef={listRef}
          />
          <MapPanel
            cities={CITIES}
            selectedId={selectedId}
            onSelectCity={handleSelect}
            devMode={DEV}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</html>
