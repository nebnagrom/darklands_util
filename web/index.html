<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darklands — Map of Greater Germany</title>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      background: #0e0d0a;
      color: #c8b882;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── City list sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #3a3020;
      background: #0b0a08;
    }

    .sidebar-header {
      padding: 14px 12px 10px;
      border-bottom: 1px solid #3a3020;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #8a7550;
      flex-shrink: 0;
    }

    .city-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .city-list::-webkit-scrollbar { width: 6px; }
    .city-list::-webkit-scrollbar-track { background: #0b0a08; }
    .city-list::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 3px; }

    .city-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 3px 12px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.5;
      color: #a89060;
      transition: background 0.1s;
    }

    .city-item:hover { background: #1a1810; color: #d4b870; }

    .city-item.selected {
      background: #2a2210;
      color: #f0d060;
    }

    .city-item .grid-ref {
      font-size: 10px;
      color: #5a4e30;
      min-width: 22px;
      text-align: right;
      font-family: monospace;
    }

    .city-item.selected .grid-ref { color: #8a7040; }

    /* ── Dev banner ── */
    .dev-banner {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      padding: 6px 12px;
      background: rgba(20, 16, 6, 0.88);
      border-bottom: 1px solid #5a4010;
      font-size: 11px;
      letter-spacing: 1px;
      color: #c89030;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      user-select: none;
    }
    .dev-banner .dev-label {
      color: #e0a020;
      font-weight: bold;
      text-transform: uppercase;
    }
    .dev-banner .dev-city {
      color: #f0d060;
    }

    /* ── Map panel ── */
    .map-panel {
      flex: 1;
      overflow: auto;
      position: relative;
      background: #0a0908;
    }

    .map-panel::-webkit-scrollbar { width: 8px; height: 8px; }
    .map-panel::-webkit-scrollbar-track { background: #0a0908; }
    .map-panel::-webkit-scrollbar-thumb { background: #3a3020; border-radius: 4px; }

    .map-container {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .map-container img {
      display: block;
      max-width: none;
    }

    /* ── SVG overlay ── */
    .map-overlay {
      position: absolute;
      top: 0;
      left: 0;
    }

    @keyframes city-pulse {
      0%, 100% { r: 7.5px; }
      50%       { r: 9.5px; }
    }

    .city-marker { cursor: pointer; }
    .city-marker circle { transition: fill 0.1s; }
    .city-marker:hover circle { fill: #d4a820; }
    .city-marker.selected circle {
      fill: #f0d060;
      r: 7.5px;
      animation: city-pulse 1.8s ease-in-out infinite;
    }
  </style>
</head>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    function CityList({ cities, selectedId, onSelect, listRef }) {
      return (
        <div className="sidebar">
          <div className="sidebar-header">Index of Cities</div>
          <div className="city-list" ref={listRef}>
            {cities.map(city => (
              <div
                key={city.id}
                className={"city-item" + (selectedId === city.id ? " selected" : "")}
                data-city-id={city.id}
                onClick={() => onSelect(city.id)}
              >
                <span>{city.name}</span>
                <span className="grid-ref">{city.grid}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function MapPanel({ cities, selectedId, onSelectCity, devMode }) {
      const panelRef = useRef(null);
      const imgRef = useRef(null);
      const svgRef = useRef(null);
      const [imgSize, setImgSize] = useState(null);

      const handleImgLoad = useCallback(() => {
        const img = imgRef.current;
        if (img) setImgSize({ w: img.offsetWidth, h: img.offsetHeight });
      }, []);

      useEffect(() => {
        if (imgRef.current && imgRef.current.complete) handleImgLoad();
      }, [handleImgLoad]);

      useEffect(() => {
        if (!selectedId || !panelRef.current || !imgRef.current) return;
        const city = cities.find(c => c.id === selectedId);
        if (!city) return;
        const img = imgRef.current;
        const panel = panelRef.current;
        panel.scrollLeft = city.px * (img.offsetWidth  / 1070) - panel.clientWidth  / 2;
        panel.scrollTop  = city.py * (img.offsetHeight / 1048) - panel.clientHeight / 2;
      }, [selectedId, cities]);

      const handleSvgClick = useCallback((e) => {
        if (!svgRef.current) return;
        const pt = svgRef.current.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const { x, y } = pt.matrixTransform(svgRef.current.getScreenCTM().inverse());
        const px = Math.round(x);
        const py = Math.round(y);
        console.log(selectedId ? `${selectedId}  px:${px}, py:${py}` : `px:${px}, py:${py}`);
      }, [selectedId]);

      const selectedCity = selectedId ? cities.find(c => c.id === selectedId) : null;

      return (
        <div className="map-panel" ref={panelRef}>
          {devMode && (
            <div className="dev-banner">
              <span className="dev-label">Dev</span>
              {selectedCity
                ? <><span>Pinning:</span><span className="dev-city">{selectedCity.name}</span><span>— click map to place</span></>
                : <span>Select a city from the list, then click the map to pin it</span>
              }
            </div>
          )}
          <div className="map-container">
            <img
              ref={imgRef}
              src="../src/main/resources/darklands_map_only.png"
              alt="Darklands — Map of Greater Germany"
              style={{ width: '120%', height: 'auto' }}
              onLoad={handleImgLoad}
            />
            {imgSize && (
              <svg
                ref={svgRef}
                className="map-overlay"
                viewBox="0 0 1070 1048"
                width={imgSize.w}
                height={imgSize.h}
                style={{
                  pointerEvents: devMode ? 'all' : 'none',
                  cursor: devMode ? 'crosshair' : 'default',
                }}
                onClick={devMode ? handleSvgClick : undefined}
              >
                {cities.map(city => (
                  <g
                    key={city.id}
                    data-marker-id={city.id}
                    className={"city-marker" + (selectedId === city.id ? " selected" : "")}
                    style={{ pointerEvents: 'all', cursor: devMode ? 'crosshair' : 'pointer' }}
                    onClick={(e) => {
                      if (devMode) return;
                      e.stopPropagation();
                      onSelectCity(city.id);
                    }}
                  >
                    <title>{city.name}</title>
                    <circle
                      cx={city.px}
                      cy={city.py}
                      r={selectedId === city.id ? 7.5 : 5}
                      fill={selectedId === city.id ? '#f0d060' : '#a08040'}
                      stroke="#0e0d0a"
                      strokeWidth="1.5"
                    />
                  </g>
                ))}
              </svg>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [selectedId, setSelectedId] = useState(null);
      const listRef = useRef(null);

      const handleSelect = useCallback((id) => {
        setSelectedId(id);
        const listEl = listRef.current && listRef.current.querySelector(`[data-city-id="${id}"]`);
        if (listEl) listEl.scrollIntoView({ block: 'center' });
      }, []);

      return (
        <div className="app">
          <CityList
            cities={CITIES}
            selectedId={selectedId}
            onSelect={handleSelect}
            listRef={listRef}
          />
          <MapPanel
            cities={CITIES}
            selectedId={selectedId}
            onSelectCity={handleSelect}
            devMode={DEV}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
