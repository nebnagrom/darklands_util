<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darklands — Saints of the Realm</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body, #root {
      height: 100%;
      background: #0d0d10;
      color: #ddd8cc;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #252530;
      background: #111116;
      overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-track { background: #111116; }
    .sidebar::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 3px; }

    .sidebar-header {
      padding: 14px 12px 10px;
      border-bottom: 1px solid #252530;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #706a58;
      margin-bottom: 5px;
    }
    .sidebar-nav {
      font-size: 10px;
      color: #484440;
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.1s;
    }
    .sidebar-nav:hover { color: #9a9080; }

    /* ── Filters ── */
    .filter-section {
      padding: 10px 12px;
      border-bottom: 1px solid #1c1c24;
      flex-shrink: 0;
    }
    .filter-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #525060;
      margin-bottom: 6px;
    }

    .search-input {
      width: 100%;
      background: #0d0d12;
      border: 1px solid #2a2a38;
      color: #ddd8cc;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 12px;
      padding: 5px 8px;
      outline: none;
      transition: border-color 0.1s;
    }
    .search-input:focus { border-color: #6a6050; }
    .search-input::placeholder { color: #323240; }

    .tag-group { margin-bottom: 8px; }
    .tag-group:last-child { margin-bottom: 0; }
    .tag-group-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #3a3848;
      margin-bottom: 4px;
    }
    .tag-chips { display: flex; flex-wrap: wrap; gap: 3px; }

    .tag-chip {
      font-size: 10px;
      padding: 2px 6px;
      border: 1px solid #222230;
      color: #585666;
      background: #0f0f16;
      cursor: pointer;
      user-select: none;
      transition: all 0.1s;
      line-height: 1.4;
    }
    .tag-chip:hover  { border-color: #4a4858; color: #9a98a8; }
    .tag-chip.active { border-color: #a08828; color: #e0c040; background: #141208; }

    .clear-btn {
      width: 100%;
      padding: 4px 8px;
      background: none;
      border: 1px solid #222230;
      color: #484858;
      cursor: pointer;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.1s;
    }
    .clear-btn:hover { border-color: #4a4858; color: #9a98a8; }

    /* ── Main panel ── */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .result-bar {
      padding: 6px 14px;
      border-bottom: 1px solid #1c1c24;
      font-size: 10px;
      color: #484858;
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
      background: #111116;
    }
    .result-bar strong { color: #a09880; font-weight: normal; }

    .table-wrap {
      flex: 1;
      overflow: auto;
    }
    .table-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
    .table-wrap::-webkit-scrollbar-track { background: #0d0d10; }
    .table-wrap::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 4px; }

    /* ── Saints table ── */
    .saints-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: auto;
    }

    .saints-table thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #101016;
      padding: 8px 12px;
      text-align: left;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #525060;
      border-bottom: 1px solid #252530;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color 0.1s;
    }
    .saints-table thead th:hover  { color: #9a98a8; }
    .saints-table thead th.sorted { color: #c8a835; }
    .sort-arrow { margin-left: 3px; font-size: 8px; opacity: 0.8; }

    .saints-table tbody tr.saint-row {
      cursor: pointer;
      transition: background 0.1s;
    }
    .saints-table tbody tr.saint-row:hover    { background: #13131a; }
    .saints-table tbody tr.saint-row.selected { background: #16161e; }

    .saints-table tbody td {
      padding: 7px 12px;
      font-size: 12px;
      color: #a09880;
      border-bottom: 1px solid #181820;
      vertical-align: top;
      line-height: 1.55;
    }

    .cell-name {
      color: #ddd8cc;
      font-size: 13px;
      white-space: nowrap;
      font-weight: normal;
    }
    .saint-row.selected .cell-name { color: #e8c840; }

    .cell-num {
      font-family: monospace;
      font-size: 11px;
      white-space: nowrap;
      text-align: right;
      color: #8a8878;
    }

    .cell-text {
      font-size: 11px;
      color: #b8b4a8;
      max-width: 320px;
      min-width: 180px;
    }
    .cell-text.dim { color: #3a3848; font-style: italic; }

    /* inline tag chips in table */
    .cell-tags { display: flex; flex-wrap: wrap; gap: 3px; min-width: 140px; }

    .ttag {
      font-size: 9px;
      padding: 1px 5px;
      border: 1px solid #222230;
      color: #585666;
      white-space: nowrap;
      line-height: 1.6;
    }
    .ttag.heal   { border-color: #2a5228; color: #68b060; }
    .ttag.combat { border-color: #5a3a10; color: #c09040; }
    .ttag.fire   { border-color: #582010; color: #c06038; }
    .ttag.mob    { border-color: #1a4858; color: #40a8c0; }
    .ttag.int    { border-color: #382858; color: #9070c0; }
    .ttag.rep    { border-color: #504010; color: #c0a020; }
    .ttag.special{ border-color: #1a3858; color: #4090c8; }
    .ttag.neg    { border-color: #581818; color: #c04848; }

    /* ── OCR paste zone ── */
    .ocr-zone {
      border: 1px dashed #252530;
      padding: 12px 8px;
      text-align: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .ocr-zone.ocr-active { border-color: #2a3848; background: #0d1018; }
    .ocr-zone.ocr-busy   { border-color: #38381a; background: #0d0d08; }

    .ocr-hint {
      font-size: 10px;
      color: #3a3848;
      line-height: 1.55;
      letter-spacing: 0.3px;
    }
    .ocr-status {
      font-size: 10px;
      color: #706a40;
      margin-top: 4px;
      line-height: 1.4;
    }
    .ocr-names { margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
    .ocr-name-chip {
      font-size: 10px;
      padding: 2px 6px;
      border: 1px solid #1a3040;
      color: #4898c0;
      background: #0d1418;
      text-align: left;
      line-height: 1.5;
    }
    .ocr-none { font-size: 10px; color: #585060; margin-top: 4px; }
    .ocr-clear {
      width: 100%;
      margin-top: 8px;
      padding: 3px 8px;
      background: none;
      border: 1px solid #222230;
      color: #484858;
      cursor: pointer;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.1s;
    }
    .ocr-clear:hover { border-color: #4a4858; color: #9a98a8; }
  </style>
</head>

  { label: 'Combat & Healing',  tags: ['heal', 'weaken-demons', 'prevent-fight', 'prevent-animal-attack', 'flame-resistance'] },
  { label: 'Mobility',          tags: ['cross-water', 'levitate-walls', 'move-to-city', 'escape-prison', 'clear-obstacles'] },
  { label: 'Interactions',      tags: ['interaction-noble', 'interaction-government', 'interaction-clergy', 'interaction-peasant', 'interaction-servant', 'interaction-woodland', 'interaction-sense-alignment', 'interaction-read-thoughts', 'interaction-glimpse-future', 'interaction-miracle', 'interaction-truth'] },
  { label: 'Reputation & Gifts',tags: ['reputation-general', 'reputation-city-specific', 'give-gold', 'give-weapon'] },
  { label: 'Special',           tags: ['cure-plague', 'survive-suffocation', 'knowledge-saint', 'purify-evil-site'] },
  { label: 'Drawbacks',         tags: ['negative-effect'] },
];

async function _ocrLoadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

async function processOcrImage(blob) {
  const url = URL.createObjectURL(blob);
  const img = await _ocrLoadImage(url);
  URL.revokeObjectURL(url);
  const scale = 3;
  const canvas = document.createElement('canvas');
  canvas.width  = img.width  * scale;
  canvas.height = img.height * scale;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    d[i] = 255 - d[i]; d[i+1] = 255 - d[i+1]; d[i+2] = 255 - d[i+2];
  }
  ctx.putImageData(id, 0, 0);
  return canvas;
}

async function runTesseract(canvas) {
  const worker = await Tesseract.createWorker('eng', 1, { logger: () => {} });
  await worker.setParameters({ tessedit_pageseg_mode: '4' });
  const { data: { text } } = await worker.recognize(canvas);
  await worker.terminate();
  return text;
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const row = Array.from({length: n + 1}, (_, j) => j);
  for (let i = 1; i <= m; i++) {
    let prev = row[0];
    row[0] = i;
    for (let j = 1; j <= n; j++) {
      const tmp = row[j];
      row[j] = a[i-1] === b[j-1] ? prev : 1 + Math.min(prev, row[j], row[j-1]);
      prev = tmp;
    }
  }
  return row[n];
}

const FUZZY_THRESHOLD = 0.7;

// Common OCR digit-for-letter substitutions in pixel fonts
const DIGIT_SUB = {'0':'o','1':'i','3':'e','5':'s','8':'b','9':'g'};
function normForMatch(s) {
  return s.toLowerCase().replace(/[0-9]/g, d => DIGIT_SUB[d] ?? d);
}

function parseSaintNames(ocrText) {
  const lines = ocrText.split('\n').map(l => l.trim()).filter(Boolean);
  const found = [];
  for (const line of lines) {
    // Extract every alphanumeric token >= 3 chars; no S prefix required
    const tokens = line.match(/[A-Za-z0-9]{3,}/g) ?? [];
    if (tokens.length === 0) {
      console.log(`[OCR line] "${line}" → no tokens`);
      continue;
    }
    let best = null, bestScore = Infinity, bestToken = '';
    for (const token of tokens) {
      const norm = normForMatch(token);
      for (const s of SAINTS) {
        const firstWord = s.name.replace(/^St\.\s+/, '').split(' ')[0].toLowerCase();
        const dist = levenshtein(norm, firstWord);
        const score = dist / Math.max(norm.length, firstWord.length);
        if (score < bestScore) { bestScore = score; best = s; bestToken = token; }
      }
    }
    const matched = bestScore <= FUZZY_THRESHOLD ? best : null;
    console.log(`[OCR line] "${line}" → token="${bestToken}" best="${best?.name}" score=${bestScore.toFixed(2)}${matched ? ' ✓' : ' ✗'}`);
    if (matched && !found.includes(matched.name)) found.push(matched.name);
  }
  return found;
}

<script type="text/babel">
  const { useState, useMemo, useCallback, useEffect } = React;

  function tagCls(tag) {
    return 'ttag ' + (TAG_CAT[tag] || '');
  }

  function OcrZone({ ocrNames, ocrStatus, onClear }) {
    const busy   = ocrStatus === 'Processing…';
    const active = ocrNames !== null;
    const cls = 'ocr-zone' + (busy ? ' ocr-busy' : active ? ' ocr-active' : '');
    return (
      <div className="filter-section">
        <div className="filter-label">Screenshot OCR</div>
        <div className={cls}>
          {!active && !busy && (
            <div className="ocr-hint">Paste a game screenshot<br/>to filter by visible saints</div>
          )}
          {ocrStatus && <div className="ocr-status">{ocrStatus}</div>}
          {active && ocrNames.length === 0 && !ocrStatus && (
            <div className="ocr-none">No saints recognised</div>
          )}
          {active && ocrNames.length > 0 && (
            <div className="ocr-names">
              {ocrNames.map(n => <div key={n} className="ocr-name-chip">{n}</div>)}
            </div>
          )}
          {active && <button className="ocr-clear" onClick={onClear}>Clear</button>}
        </div>
      </div>
    );
  }

  function FilterSidebar({ nameFilter, setNameFilter, activeTags, toggleTag, clearFilters, ocrNames, ocrStatus, onOcrClear }) {
    const hasFilters = nameFilter || activeTags.size > 0 || ocrNames !== null;
    return (
      <div className="sidebar">
        <div className="sidebar-header">
          <div className="sidebar-title">Saints of the Realm</div>
          <a href="index.html" className="sidebar-nav">← Home</a>
        </div>

        <div className="filter-section">
          <div className="filter-label">Search by name</div>
          <input
            className="search-input"
            type="text"
            placeholder="e.g. Anthony…"
            value={nameFilter}
            onChange={e => setNameFilter(e.target.value)}
          />
        </div>

        <OcrZone ocrNames={ocrNames} ocrStatus={ocrStatus} onClear={onOcrClear} />

        <div className="filter-section">
          <div className="filter-label">Filter by effect</div>
          {TAG_GROUPS.map(group => (
            <div key={group.label} className="tag-group">
              <div className="tag-group-label">{group.label}</div>
              <div className="tag-chips">
                {group.tags.map(tag => (
                  <span
                    key={tag}
                    className={'tag-chip' + (activeTags.has(tag) ? ' active' : '')}
                    onClick={() => toggleTag(tag)}
                  >
                    {TAG_LABELS[tag]}
                  </span>
                ))}
              </div>
            </div>
          ))}
        </div>

        {hasFilters && (
          <div className="filter-section">
            <button className="clear-btn" onClick={clearFilters}>Clear all filters</button>
          </div>
        )}
      </div>
    );
  }

  function SaintsTable({ saints, selectedName, onSelect, sortCol, sortDir, onSort }) {
    function th(col, label) {
      return (
        <th className={sortCol === col ? 'sorted' : ''} onClick={() => onSort(col)}>
          {label}
          {sortCol === col && <span className="sort-arrow">{sortDir === 'asc' ? '▲' : '▼'}</span>}
        </th>
      );
    }

    return (
      <table className="saints-table">
        <thead>
          <tr>
            {th('name',    'Name')}
            {th('virtue',  'Min Virtue')}
            {th('favour',  'Divine Favour')}
            {th('success', 'Base Success')}
            <th>Stat Bonuses</th>
            <th>Special Ability</th>
            <th>Effects</th>
          </tr>
        </thead>
        <tbody>
          {saints.map(saint => {
            const sel = selectedName === saint.name;
            return (
              <tr
                key={saint.name}
                className={'saint-row' + (sel ? ' selected' : '')}
                onClick={() => onSelect(saint.name)}
              >
                <td className="cell-name">{saint.name}</td>
                <td className="cell-num">{saint.virtue}</td>
                <td className="cell-num">{saint.favour}</td>
                <td className="cell-num">{saint.success}%</td>
                <td className={saint.effects ? 'cell-text' : 'cell-text dim'}>
                  {saint.effects || '—'}
                </td>
                <td className={saint.detail ? 'cell-text' : 'cell-text dim'}>
                  {saint.detail || '—'}
                </td>
                <td>
                  <div className="cell-tags">
                    {saint.tags.map(t => (
                      <span key={t} className={tagCls(t)}>{TAG_LABELS[t]}</span>
                    ))}
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    );
  }

  function App() {
    const [nameFilter, setNameFilter]   = useState('');
    const [activeTags, setActiveTags]   = useState(new Set());
    const [selectedName, setSelected]   = useState(null);
    const [sortCol, setSortCol]         = useState('name');
    const [sortDir, setSortDir]         = useState('asc');
    const [ocrNames, setOcrNames]       = useState(null);
    const [ocrStatus, setOcrStatus]     = useState('');

    useEffect(() => {
      setSortCol('name');
      setSortDir('asc');
    }, [nameFilter, activeTags, ocrNames]);

    useEffect(() => {
      async function handlePaste(e) {
        const items = Array.from(e.clipboardData?.items || []);
        const imgItem = items.find(it => it.type.startsWith('image/'));
        if (!imgItem) return;
        e.preventDefault();
        setOcrStatus('Processing…');
        setOcrNames(null);
        try {
          const blob = imgItem.getAsFile();
          const canvas = await processOcrImage(blob);
          const text   = await runTesseract(canvas);
          console.log('[OCR] raw text:', text);
          const names  = parseSaintNames(text);
          console.log('[OCR] saints found:', names);
          setOcrNames(names);
          setOcrStatus(names.length > 0 ? `${names.length} saint${names.length > 1 ? 's' : ''} found` : '');
        } catch (_) {
          setOcrStatus('OCR failed');
          setOcrNames([]);
        }
      }
      document.addEventListener('paste', handlePaste);
      return () => document.removeEventListener('paste', handlePaste);
    }, []);

    const toggleTag = useCallback((tag) => {
      setActiveTags(prev => {
        const next = new Set(prev);
        if (next.has(tag)) next.delete(tag); else next.add(tag);
        return next;
      });
    }, []);

    const clearFilters = useCallback(() => {
      setNameFilter('');
      setActiveTags(new Set());
      setOcrNames(null);
      setOcrStatus('');
    }, []);

    const clearOcr = useCallback(() => {
      setOcrNames(null);
      setOcrStatus('');
    }, []);

    const onSort = useCallback((col) => {
      setSortCol(prev => {
        if (prev === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
        else { setSortDir('asc'); }
        return col;
      });
    }, []);

    const onSelect = useCallback((name) => {
      setSelected(prev => prev === name ? null : name);
    }, []);

    const filtered = useMemo(() => {
      let list = SAINTS;
      if (ocrNames !== null) {
        list = list.filter(s => ocrNames.includes(s.name));
      } else {
        if (nameFilter.trim()) {
          const q = nameFilter.trim().toLowerCase();
          list = list.filter(s => s.name.toLowerCase().includes(q));
        }
        if (activeTags.size > 0) {
          list = list.filter(s => s.tags.some(t => activeTags.has(t)));
        }
      }
      return list;
    }, [nameFilter, activeTags, ocrNames]);

    const sorted = useMemo(() => {
      return [...filtered].sort((a, b) => {
        let av, bv;
        if      (sortCol === 'name')    { av = a.name;    bv = b.name; }
        else if (sortCol === 'virtue')  { av = a.virtue;  bv = b.virtue; }
        else if (sortCol === 'favour')  { av = parseInt(a.favour); bv = parseInt(b.favour); }
        else if (sortCol === 'success') { av = a.success; bv = b.success; }
        if (av < bv) return sortDir === 'asc' ? -1 : 1;
        if (av > bv) return sortDir === 'asc' ?  1 : -1;
        return 0;
      });
    }, [filtered, sortCol, sortDir]);

    return (
      <div className="app">
        <FilterSidebar
          nameFilter={nameFilter}
          setNameFilter={setNameFilter}
          activeTags={activeTags}
          toggleTag={toggleTag}
          clearFilters={clearFilters}
          ocrNames={ocrNames}
          ocrStatus={ocrStatus}
          onOcrClear={clearOcr}
        />
        <div className="main-panel">
          <div className="result-bar">
            <strong>{sorted.length}</strong> of {SAINTS.length} saints
            {ocrNames !== null && <strong style={{marginLeft: 8}}>· OCR filter active</strong>}
            {ocrNames === null && activeTags.size > 0 && <strong style={{marginLeft: 8}}>· {activeTags.size} filter{activeTags.size > 1 ? 's' : ''} active</strong>}
          </div>
          <div className="table-wrap">
            <SaintsTable
              saints={sorted}
              selectedName={selectedName}
              onSelect={onSelect}
              sortCol={sortCol}
              sortDir={sortDir}
              onSort={onSort}
            />
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
